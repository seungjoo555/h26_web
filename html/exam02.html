Apache Server
index.html

URL을 통해서 index.html에 요청
http://서버ip:80/index.html

Web Server(WS)
Apache Server <- 정적문서처리
html, css, image, 영상, 파일 등 즉시 응답 가능한 문서만 처리

동적인 문서를 처리할 서버가 필요
Web Application Server(WAS)
Apache Tomcat <- 동적 문서 처리
Tomcat은 WAS이지만 웹서버의 역할도 같이 해준다.
웹 서버와 웹 컨테이너가 합쳐진 형태
웹 서버 단독으로는 처리할 수 없는 데이터베이스의 조회나 다양한 로직 처리가 필요한 동적 컨텐츠를 제공
JSP, Servlet 구동환경을 제공해주기 때문에 웹 컨테이너 혹은 서블릿 컨테이너라고도 불린다.

WAS만 써도 되겠네? 답은X
WAS는 DB 조회 및 다양한 로직을 처리하는 데 집중해야 한다. 
따라서 단순한 정적 컨텐츠는 웹서버에게 맡기며 기능을 분리시켜 서버 부하를 방지한다. 
만약 WAS가 정적 컨텐츠 요청까지 처리하면, 부하가 커지고 동적 컨텐츠 처리가 지연되면서 
수행 속도가 느려지고 이로 인해 페이지 노출 시간이 늘어나는 문제가 발생하여 효율성이 크게 떨어진다.
**웹 서버를 WAS 앞에 두고 필요한 WAS들을 Web Server에 플러그인 형태로 설정하면 더욱 효율적인 분산 처리가 가능하다.**
-->
