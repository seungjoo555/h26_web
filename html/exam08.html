<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- action="서버URL" method="get(보안X) or post(보안O)"-->
    <form action="#" method="get 또는 post">
        <!-- type 속성은 필수; 입력요소는 아이디, 비밀번호 외에도 콤보박스, 파일업로드, 체크박스, 라디오버튼등 다양-->
        <!--  name, value 속성은 선택 사용 -->
        <!-- <input type="종류" name="이름" value="초깃값"> -->
        <input type="text"><br>
        <input type="password"><br>
        <input type="tel"><br>
        <input type="number"><br>
        <input type="url"><br>
        <input type="search"><br>
        <input type="email"><br>
        <input type="checkbox"><br>
        <input type="radio"><br>
        <input type="file"><br>
        <input type="button"><br>
        <input type="image" src="../image/mad_dog.jpg"><br>
        <input type="hidden"><br>
        <input type="date"><br>
        <input type="datetime-local"><br>
        <input type="month"><br>
        <input type="week"><br>
        <input type="time"><br>
        <input type="range"><br>
        <input type="color"><br>
        <input type="submit"><br>
        <input type="reset">
    </form>
</body>
</html>

<!--
input 태그로 생성할 수 있는 입력 요소와 type 속성값
text        : 한 줄 텍스트를 입력할 수 있는 요소 생성
password    : 비밀번호를 입력할 수 있는 요소를 생성
tel         : 전화번호 형식을 입력할 수 있는 요소를 생성
number      : 숫자만 입력할 수 있는 요소를 생성
url         : URL 주소 형식을 입력할 수 있는 요소를 생성
search      : 검색용 텍스트를 입력할 수 있는 요소를 생성
email       : 이메일 형식을 입력할 수 있는 요소를 생성
checkbox    : 체크박스 요소를 생성
radio       : 라디오 버튼 요소 생성
file        : 파일 업로드 요소 생성
button      : 버튼 요소를 생성
image       : 이미지로 버튼 요소를 생성. img 태그처럼 src속성 사용해야 함. 단, alt 속성은 사용하지 않음
hidden      : 사용자 눈에 보이지 않는 입력 요소를 생성
date        : 날짜(연, 월, 일)를 선택할 수 있는 입력 요소를 생성
datetime-local : 사용자 시간대에 맞는 날짜(연, 월, 일, 시, 분)를 선택할 수 있는 입력 요소를 생성
month       : 날짜(연, 월)를 선택할 수 있는 입력 요소를 생성
week        : 날짜(연, 주차)를 선택할수 있는 입력 요소 생성
time        : 시간을 선택할 수 이쓴ㄴ 입력 요소를 생성
range       : 숫자 범위를 선택할 수 있는 입력 요소를 생성
color       : 색상을 선택할 수 있는 요소를 생성
submit      : 폼 전송 역할을 하는 버튼 요소 생성
reset       : 폼 요소에 사용자가 입력한 값을 초기화하는 버튼 요소 생성

● name 속성

name 속성에는 입력 요소의 이름을 작성합니다. 
입력 요소가 form 태그에 의해 서버로 전송될 때, name 속성에 적힌 값이 이름으로 지정됩니다. 
서버에서는 지정된 이름으로 입력 요소를 식별할 수 있습니다.

● value 속성

value 속성에는 입력 요소의 초깃값을 작성합니다. 
입력 요소는 보통 사용자에게서 수동으로 값을 입력받지만, 상황에 따라 초깃값을 설정해야 하는 경우가 있습니다. 
이럴 때 사용하는 속성입니다.
-->
