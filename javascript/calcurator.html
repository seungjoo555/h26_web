<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 초기화 */
        body, h1, div, input, button {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }

        body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        /* 지브리 특유의 따뜻하고 맑은 하늘색 배경 */
        background-color: #e0f7fa; 
        /* 웹 폰트 적용 */
        font-family: 'Nanum Pen Script', cursive;
        overflow: hidden; /* 배경 애니메이션용 */
        }

        /* 계산기 메인 컨테이너 */
        .calculator {
        width: 320px;
        /* 부드러운 나무 질감의 배경색 */
        background-color: #fff8e1; 
        padding: 20px;
        border-radius: 25px;
        /* 자연스러운 입체감을 위한 그림자 */
        box-shadow: 0 10px 25px rgba(0,0,0,0.1), inset 0 -5px 10px rgba(0,0,0,0.05);
        border: 4px solid #d7ccc8; /* 나뭇가지 느낌의 테두리 */
        position: relative;
        z-index: 10;
        }

        /* 결과 디스플레이 영역 */
        .resultDisplay {
        margin-bottom: 20px;
        }

        /* 디스플레이 입력창 스타일 */
        #display {
        width: 100%;
        height: 60px;
        border: none;
        /* 약간 바랜 듯한 따뜻한 종이 질감 */
        background-color: #fafafa;
        border-radius: 15px;
        padding: 10px 20px;
        font-size: 36px;
        text-align: right;
        color: #5d4037; /* 짙은 나무색 글자 */
        box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
        font-family: inherit; /* 부모 폰트 상속 */
        }

        /* 버튼 영역 */
        .buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
        }

        /* 버튼 행 */
        .button_div {
        display: flex;
        gap: 10px;
        }

        /* 기본 버튼 스타일 */
        button {
        flex: 1;
        height: 50px;
        border: none;
        border-radius: 12px;
        font-size: 20px;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s ease;
        color: #5d4037;
        /* 부드러운 손때 묻은 듯한 그림자 */
        box-shadow: 0 4px 0 #d7ccc8;
        position: relative;
        overflow: hidden;
        }

        /* 버튼 호버 효과: 약간 떠오르는 느낌 */
        button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 0 #d7ccc8;
        }

        /* 버튼 클릭 효과: 눌리는 느낌 */
        button:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #d7ccc8;
        }

        /* 숫자 버튼 (기본) */
        .button_div:not(:last-child) button:not([onclick*="Operation"]):not([onclick*="calculate"]) {
        /* 맑고 따뜻한 노란색 */
        background-color: #ffe082;
        }

        .button_div:not(:last-child) button:not([onclick*="Operation"]):not([onclick*="calculate"]):hover {
        background-color: #ffd54f;
        }

        /* 연산자 및 특수 버튼 */
        .button_div button[onclick*="Operation"] {
        /* 따뜻한 주황색/브라운 */
        background-color: #ffb74d; 
        }

        .button_div button[onclick*="Operation"]:hover {
        background-color: #ffa726;
        }

        /* '=' 버튼: 특별하게 표시 */
        button[onclick="calculate()"] {
        /* 활기찬 초록색 */
        background-color: #81c784; 
        }

        button[onclick="calculate()"]:hover {
        background-color: #66bb6a;
        }

        /* 프로그래머 및 진법 버튼 */
        button[onclick="Programer()"] {
        /* 차분한 파란색 */
        background-color: #81d4fa; 
        }

        button[onclick="Programer()"]:hover {
        background-color: #4fc3f7;
        }

        button[onclick$="Operation()"] { /* '진수' 버튼들 */
        /* 더 짙은 브라운 */
        background-color: #a1887f; 
        color: white;
        font-size: 16px;
        }

        button[onclick$="Operation()"]:hover {
        background-color: #8d6e63;
        }

        /* 숨겨진 버튼 처리 */
        button[hidden] {
        display: none;
        }

        /* 지브리 분위기 디테일 (옵션) */
        .calculator::before {
        content: '🌿'; /* 작은 잎새 장식 */
        position: absolute;
        top: -15px;
        right: 20px;
        font-size: 24px;
        }

        .calculator::after {
        content: '🐾'; /* 작은 발자국 장식 */
        position: absolute;
        bottom: -15px;
        left: 20px;
        font-size: 24px;
        opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="resultDisplay">
        <!-- 결과창 -->
        <input type="text" id="display" readonly placeholder="0">
        </div>
        <!-- 버튼 영역 -->
        <div class="buttons">
            <div class="button_div">
                <button onclick="eraserOperation()">Backspace</button>
                <button onclick="deleteAllOperation()">C</button>
            </div>
            <div class="button_div">
                <button onclick="addDisplay('7')">7</button>
                <button onclick="addDisplay('8')">8</button>
                <button onclick="addDisplay('9')">9</button>
                <button onclick="MultipleOperation()">X</button>
            </div>
            <div class="button_div">
                <button onclick="addDisplay('4')">4</button>
                <button onclick="addDisplay('5')">5</button>
                <button onclick="addDisplay('6')">6</button>
                <button onclick="SubtractionOperation()">-</button>
            </div>
            <div class="button_div">
                <button onclick="addDisplay('1')">1</button>
                <button onclick="addDisplay('2')">2</button>
                <button onclick="addDisplay('3')">3</button>
                <button onclick="AdditionOperation()">+</button>
            </div>
            <div class="button_div">
                <button onclick="DecimalPoint()">.</button>
                <button onclick="addDisplay('0')">0</button>
                <button onclick="calculate()">=</button>
                <button onclick="DivisionOperation()">/</button>
            </div>
            <div class="button_div">
                <button onclick="Programer()">프로그래머</button>
                <button hidden onclick="BinaryOperation()">2진수</button>
                <button hidden onclick="OctalOperation()">8진수</button>
                <button hidden onclick="HexadecimalOperation()">16진수</button>
            </div>
        </div>
    </div>
    <script>
        // 원본 숫자를 저장할 변수
        let originalNumber = "";
        //입력창
        function addDisplay(num) {
            let display = document.getElementById("display");
            display.value += num;
            // 숫자를 입력할 때마다 원본 값을 갱신합니다.
            originalNumber = display.value;
        }
        //하나씩 지우개
        function eraserOperation() {
            let display = document.getElementById("display");
            display.value = display.value.slice(0, -1);
            originalNumber = display.value;
        }
        //다 지우개
        function deleteAllOperation() {
            let display = document.getElementById("display");
            display.value = '';
            originalNumber = "";
        }
        // 공통 연산 처리 함수: 현재까지의 식을 계산한 뒤 연산자를 붙임
        function applyOperator(operator) {
            let display = document.getElementById("display");
            let currentVal = display.value;

            if (currentVal === "") return; // 빈 상태에선 연산자 입력 불가

            // 마지막 글자가 이미 연산자라면 연산자만 교체, 아니라면 계산 후 추가
            if (isNaN(currentVal.slice(-1))) {
                display.value = currentVal.slice(0, -1) + operator;
            } else {
                try {
                    // 지금까지의 식을 계산한 결과에 새 연산자를 붙임
                    display.value = eval(currentVal) + operator;
                } catch (e) {
                    display.value = "Error";
                }
            }
        }
        //곱하기
        function MultipleOperation() {applyOperator('*')}
        //빼기
        function SubtractionOperation() {applyOperator('-')}
        //더하기
        function AdditionOperation() {applyOperator('+')}
        //나누기
        function DivisionOperation() {applyOperator('/')}

        // --- 결과 계산 함수 (= 버튼) ---
        function calculate() {
            let display = document.getElementById("display");
            try {
                // eval 함수를 사용하여 문자열로 된 수식을 계산합니다.
                display.value = eval(display.value);
            } catch (e) {
                alert("수식이 올바르지 않습니다.");
                display.value = "";
            }
        }

        // 소수점 추가 함수
        function DecimalPoint() {
            let display = document.getElementById("display");
            if (!display.value.includes(".")) {
                display.value += ".";
            }
        }
        // 프로그래머 버튼 토글 기능
        function Programer() {
            // hidden 속성을 가진 버튼들을 모두 찾음
            const extraButtons = document.querySelectorAll('.button_div button[onclick*="Operation()"]');
            
            extraButtons.forEach(btn => {
                // 진법 변환 버튼들만 골라서 토글 (2진수, 8진수, 16진수)
                if (btn.innerText.includes("진수")) {
                    btn.hidden = !btn.hidden;
                }
            });
        }

        // 진법 변환 공통 로직
        function convertBase(base) {
            let display = document.getElementById("display");
            
            // 계산기 식(예: 10+20)이 들어있을 수 있으므로 먼저 계산을 수행
            let currentVal;
            try {
                currentVal = eval(originalNumber);
            } catch (e) {
                alert("올바른 숫자가 아닙니다.");
                return;
            }

            if (originalNumber === "" || isNaN(currentVal)) {
                alert("변환할 숫자를 먼저 입력하세요.");
                return;
            }

            let number = parseInt(currentVal, 10);
            
            // 화면(display.value)만 변경하고 originalNumber는 유지합니다.
            if (base === 2) display.value = number.toString(2);
            else if (base === 8) display.value = number.toString(8);
            else if (base === 16) display.value = number.toString(16).toUpperCase();
        }

        // 주의: 사칙연산 함수에서도 originalNumber를 갱신해야 합니다.
        function applyOperator(operator) {
            let display = document.getElementById("display");
            if (display.value === "") return;

            try {
                // 현재까지의 식을 계산해서 originalNumber에 저장
                let result = eval(originalNumber);
                originalNumber = result + operator;
                display.value = originalNumber;
            } catch (e) {
                display.value = "Error";
            }
        }
        // 각 진법 버튼 함수 연결
        function BinaryOperation() { convertBase(2); }
        function OctalOperation() { convertBase(8); }
        function HexadecimalOperation() { convertBase(16); }
    </script>
</body>
</html>
