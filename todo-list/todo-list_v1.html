<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoToDo Liiiiiiiiiiiist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="todoStyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="todoScript_v1.js"></script>
</head>
<body>
    <div class="container">
        <div>
            <h1>Todo List</h1>
            <input type="hidden" id="todoId">
            <input type="hidden" id="todoComplete">
            <input type="text" placeholder="할일을 입력하세요" id="todoInput">
    
            <select id="category" >
                <option value="공부">공부</option>
                <option value="과제">과제</option>
                <option value="운동">운동</option>
                <option value="취미">취미</option>
                <option value="기타">기타</option>
            </select>
    
            <select id="priority">
                <option value="높음">높음</option>
                <option value="중간">중간</option>
                <option value="낮음">낮음</option>
            </select>
            <input type="date" id="endDate">
    
            <button type="button" id="addBtn" class="btn btn-outline-success" >추가</button>
            <button type="button" id="updateBtn" class="btn btn-outline-warning" >수정 완료</button>
        </div>
        <div>
            <input type="text" placeholder="검색" id="todoSearch">
        </div>
        <div>
            <button type="button" id="updateBtn" class="btn btn-info" >전체</button>
            <button type="button" id="updateBtn" class="btn btn-info" >진행중</button>
            <button type="button" id="updateBtn" class="btn btn-info" >완료</button>
        </div>
        <div>
            <p>
                정렬 방식 :
                <select id="sort">
                    <option value="new">최신순</option>
                    <option value="priority">우선순위순</option>
                    <option value="endDay">마감일순</option>
                </select>
            </p>
        </div>
        <div>
            <ul id="todolist" class="list-group"></ul>
        </div>
    </div>
</body>
</html>
