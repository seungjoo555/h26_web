<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 마법의 Todo List ✨</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="todoStyle.css">
</head>
<body>
    <div class="container py-4">
        <div class="text-center mb-4">
            <h1>Todo List</h1>
            <input type="hidden" id="todoId">
            <input type="hidden" id="todoComplete">
        </div>

        <div class="input-section p-4 mb-4">
            <div class="row g-3">
                <div class="col-12">
                    <input type="text" class="form-control" placeholder="어떤 마법 같은 일을 하실 건가요?" id="todoInput">
                </div>
                <div class="col-md-4">
                    <label class="form-label small-label">✨ 카테고리</label>
                    <select id="category" class="form-select">
                        <option value="공부">📚 공부</option>
                        <option value="과제">📝 과제</option>
                        <option value="운동">🏃 운동</option>
                        <option value="취미">🎨 취미</option>
                        <option value="기타">🎈 기타</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label small-label">⭐ 우선순위</label>
                    <select id="priority" class="form-select">
                        <option value="높음">🔥 높음</option>
                        <option value="중간">⚡ 중간</option>
                        <option value="낮음">🌱 낮음</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label small-label">📅 마감일</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
                <div class="col-12 text-end mt-4">
                    <button type="button" id="addBtn" class="btn btn-add w-100 py-2">✨ 할 일 추가하기</button>
                    <button type="button" id="updateBtn" class="btn btn-update w-100 py-2 d-none">🪄 수정 완료하기</button>
                </div>
            </div>
        </div>

        <div class="filter-section p-3 mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-md-6">
                    <input type="text" class="form-control" placeholder="🔍 기억이 안 날 땐 검색해보세요!" id="todoSearch">
                </div>
                <div class="col-md-6 text-md-end d-flex gap-2 justify-content-md-end justify-content-center">
                    <button type="button" id="filterAll" class="btn btn-filter active">전체</button>
                    <button type="button" id="filterActive" class="btn btn-filter">진행중</button>
                    <button type="button" id="filterCompleted" class="btn btn-filter">완료</button>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12 d-flex align-items-center justify-content-end gap-2">
                    <span class="sort-label">정렬 방식 :</span>
                    <select id="sort" class="form-select form-select-sm auto-width-select">
                        <option value="new">⏰ 최신순</option>
                        <option value="priority">🔥 우선순위순</option>
                        <option value="endDay">📅 마감일순</option>
                    </select>
                </div>
            </div>
        </div>

        <div>
            <ul id="todolist" class="p-0"></ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="todoScript.js"></script>
</body>
</html>
